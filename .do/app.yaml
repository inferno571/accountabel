name: accountabel-ai
region: blr  # Bangalore – closest to you (India)

services:
  - name: accountabel-server
    source_dir: /
    dockerfile_path: Dockerfile
    github:
      repo: inferno571/accountabel
      branch: main
      deploy_on_push: true
    http_port: 36060
    instance_count: 1
    instance_size_slug: basic-xxs   # $6/month – 512MB RAM, 1 vCPU
    health_check:
      http_path: /
    envs:
      - key: TELEGRAM_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: GEMINI_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: DISCORD_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: TYPE
        scope: RUN_TIME
        value: "gemini"
      - key: HTTP_HOST
        scope: RUN_TIME
        value: ":36060"
